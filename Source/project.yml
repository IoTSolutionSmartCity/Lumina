name: SmartLamp
options:
  bundleIdPrefix: com.lumina
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: "Lumina"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "Lumina uses Bluetooth to discover and connect to your smart lamp."
    INFOPLIST_KEY_NSBluetoothPeripheralUsageDescription: "Lumina uses Bluetooth to communicate with your smart lamp."
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Lumina uses the local network to communicate with HomeKit accessories."
        INFOPLIST_KEY_NSHomeKitUsageDescription: "Lumina uses HomeKit to pair with and control your smart lamp as a native accessory."
    INFOPLIST_KEY_NSBonjourServices: "_hap._tcp"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    CODE_SIGN_ENTITLEMENTS: SmartLamp.entitlements
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  SmartLamp:
    type: application
    platform: iOS
    sources:
      - path: Lumina
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumina.smartlamp
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    entitlements:
      path: SmartLamp.entitlements
    info:
      path: SmartLampInfo.plist
      properties:
        UIBackgroundModes:
          - bluetooth-central
        NSBluetoothAlwaysUsageDescription: "Lumina uses Bluetooth to discover and connect to your smart lamp."
        NSBluetoothPeripheralUsageDescription: "Lumina uses Bluetooth to communicate with your smart lamp."
        NSLocalNetworkUsageDescription: "Lumina uses the local network to communicate with HomeKit accessories."
        NSHomeKitUsageDescription: "Lumina uses HomeKit to pair with and control your smart lamp as a native accessory."
        NSBonjourServices:
          - "_hap._tcp"
        CFBundleDisplayName: "Lumina"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}

schemes:
  SmartLamp:
    build:
      targets:
        SmartLamp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
